name = "wokapi"
main = "src/index.ts"
compatibility_date = "2026-02-20"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[routes]]
pattern = "api.wokspec.org"
custom_domain = true

[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "487bab854f714db8a46e50f80f51d766"

[[d1_databases]]
binding = "DB"
database_name = "wokspec-auth"
database_id = "91a906ce-52b6-46db-896b-246195af781f"

[vars]
ERAL_API_URL = "https://eral.wokspec.org/api/v1"

# Secrets (set via `wrangler secret put`):
# - JWT_SECRET
# - GITHUB_CLIENT_ID
# - GITHUB_CLIENT_SECRET
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - DISCORD_CLIENT_ID
# - DISCORD_CLIENT_SECRET
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - RESEND_API_KEY
